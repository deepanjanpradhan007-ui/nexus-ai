<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus AI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #07080f; --surface: #0e101a; --surface2: #141725;
      --border: rgba(255,255,255,0.07); --border-bright: rgba(255,255,255,0.15);
      --text: #f0f2ff; --muted: #6b7099; --accent: #7c6af7; --green: #56e0a0;
      --red: #ff6b7a; --glow: 0 0 40px rgba(124,106,247,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .blob { position:fixed; border-radius:50%; filter:blur(120px); opacity:0.1; pointer-events:none; }
    .blob-1 { width:500px; height:500px; background:#7c6af7; top:-150px; left:-150px; }
    .blob-2 { width:400px; height:400px; background:#4fd1c5; bottom:-100px; right:-100px; }

    .card {
      position:relative; z-index:1;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:48px 40px;
      width:100%; max-width:420px;
      box-shadow: var(--glow);
    }

    .logo {
      display:flex; align-items:center; justify-content:center; gap:10px;
      margin-bottom:32px;
    }
    .logo-dot { width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }
    .logo-text { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }

    .tabs {
      display:flex; background:var(--surface2); border-radius:12px; padding:4px;
      margin-bottom:28px;
    }
    .tab {
      flex:1; padding:9px; border:none; background:transparent;
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      color:var(--muted); border-radius:9px; cursor:pointer; transition:all 0.2s;
    }
    .tab.active { background:var(--accent); color:white; box-shadow:0 4px 14px rgba(124,106,247,0.4); }

    .social-btn {
      width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
      padding:12px; border-radius:12px; border:1px solid var(--border);
      background:var(--surface2); color:var(--text); font-family:'DM Sans',sans-serif;
      font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; margin-bottom:10px;
    }
    .social-btn:hover { border-color:var(--border-bright); background:#1a1d2e; transform:translateY(-1px); }
    .social-btn img { width:18px; height:18px; }

    .divider {
      display:flex; align-items:center; gap:12px;
      margin:20px 0; color:var(--muted); font-size:12px;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .field { margin-bottom:16px; }
    .field label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:6px; letter-spacing:0.05em; text-transform:uppercase; }
    .field input {
      width:100%; padding:12px 14px; border-radius:10px;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
      outline:none; transition:border-color 0.2s;
    }
    .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,106,247,0.1); }
    .field input::placeholder { color:rgba(107,112,153,0.5); }

    .btn-primary {
      width:100%; padding:13px; border:none; border-radius:12px;
      background:linear-gradient(135deg,#7c6af7,#5d4fe0);
      color:white; font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
      cursor:pointer; transition:all 0.25s; margin-top:4px;
      box-shadow:0 4px 20px rgba(124,106,247,0.35);
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,106,247,0.5); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    .msg { padding:10px 14px; border-radius:10px; font-size:13px; margin-top:14px; display:none; }
    .msg.error { background:rgba(255,107,122,0.1); border:1px solid rgba(255,107,122,0.25); color:var(--red); }
    .msg.success { background:rgba(86,224,160,0.1); border:1px solid rgba(86,224,160,0.25); color:var(--green); }

    .footer-note { text-align:center; font-size:12px; color:var(--muted); margin-top:20px; }
    .footer-note a { color:#a89ff9; text-decoration:none; }

    .free-badge {
      text-align:center; margin-bottom:24px;
      font-size:13px; color:var(--muted);
    }
    .free-badge span {
      display:inline-block; padding:4px 12px; border-radius:100px;
      background:rgba(86,224,160,0.1); border:1px solid rgba(86,224,160,0.25);
      color:var(--green); font-size:12px; font-weight:500;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">Nexus AI</div>
    </div>

    <div class="free-badge">
      <span>✨ 50 free queries per day after signup</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Social logins -->
    <button class="social-btn" onclick="socialLogin('google')">
      <img src="https://www.google.com/favicon.ico"/> Continue with Google
    </button>
    <button class="social-btn" onclick="socialLogin('github')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      Continue with GitHub
    </button>

    <div class="divider">or continue with email</div>

    <!-- Email form -->
    <div id="signin-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="emailSignIn()">Sign In →</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters"/>
      </div>
      <button class="btn-primary" onclick="emailSignUp()">Create Account →</button>
    </div>

    <div class="msg error" id="error-msg"></div>
    <div class="msg success" id="success-msg"></div>

    <div class="footer-note">
      By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </div>
  </div>

  <script>
    // ── Init Supabase ──
    const SUPABASE_URL = window.SUPABASE_URL || 'https://riowwqpzlsusopwcawsl.supabase.co';
    const SUPABASE_KEY = window.SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpb3d3cXB6bHN1c29wd2Nhd3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODkyODksImV4cCI6MjA4NzY2NTI4OX0.D5WCUlIWL4kvAzVCdJkX4hhrebdURjbHAiaxr8XD924';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, go to app
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = '/';
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('signin-form').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      hideMessages();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = '⚠️ ' + msg; el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = '✅ ' + msg; el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }
    function hideMessages() {
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }

    async function socialLogin(provider) {
      const { error } = await supabase.auth.signInWithOAuth({
        provider,
        options: { redirectTo: window.location.origin + '/' }
      });
      if (error) showError(error.message);
    }

    async function emailSignIn() {
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) return showError('Please fill in all fields.');
      const btn = document.querySelector('#signin-form .btn-primary');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { showError(error.message); btn.disabled=false; btn.textContent='Sign In →'; }
      else window.location.href = '/';
    }

    async function emailSignUp() {
      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      if (!name || !email || !password) return showError('Please fill in all fields.');
      if (password.length < 6) return showError('Password must be at least 6 characters.');
      const btn = document.querySelector('#signup-form .btn-primary');
      btn.disabled = true; btn.textContent = 'Creating account…';
      const { error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) { showError(error.message); btn.disabled=false; btn.textContent='Create Account →'; }
      else showSuccess('Account created! Check your email to confirm, then sign in.');
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const signinVisible = document.getElementById('signin-form').style.display !== 'none';
      if (signinVisible) emailSignIn(); else emailSignUp();
    });
  </script>
</body>
</html>
